<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login  page</title>
</head>
<body>
    <table border="3">
    
    <table  bgcolor="white" cellpadding="15" width="350" align="center">
        <tr>
            <td align="center"><h5>English(UK)</h5>
            <img src="https://cdn.pixabay.com/photo/2017/02/08/08/38/facebook-2048127_1280.png" 
                width="96" height="96"></td>
        </tr>
        
        
    <!--- email and password-->
    
        <tr>
            <td>
                <input type="text" placeholder="  Mobile number or email address " 
              style="width:300px;height:50px;border:1px solid gray;border-radius:16px;">
            </td>
        </tr>

        <tr>
            <th>
                <input type="password" placeholder=" Password " 
                style="width:300px;height:50px;border:1px solid gray;border-radius:16px;">
            </th>
        </tr>
    <!---login button-->
        <tr>
            <td align="center"><input type="submit" value="Log in"
                style="width:300px;height:40px;background-color: blue;color:white;border:1px blue;border-radius:20px;">
                </td>
            </tr>
    <!---forgotten password-->
    <tr>
        <td align="center">
            <a href="#">Forgotten password?</a>  
        </td>
    </tr>
    <td align="center"><input type="button" value="Create new account"
        style="width:300px;height:40px;border:2px blue;color:blue;border-radius:20px;">
        </td>
    </tr>
    <!---meta symbol-->
    <tr>
<td style="display:flex;align-items:center;gap:1px;justify-content:center;"><img src=" https://img.magnific.com/free-vector/blue-infinity-symbol_1284-43066.jpg"
     width="8%" hieght="5%" align="center">
     <h3>Meta</h3>

</td>
    </tr>

    </table>
</table>
</body>
</html>
